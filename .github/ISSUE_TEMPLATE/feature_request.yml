name: Feature request
description: Suggest a focused improvement to osiiso.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and where does the current API fall short?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behavior you would like.
      render: python
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Affected backend
      options:
        - AsyncQueue
        - ThreadQueue
        - ProcessQueue
        - All queue backends
        - Documentation only
        - Not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other designs have you considered?
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility notes
      description: Mention migration concerns, breaking changes, or performance implications if known.
